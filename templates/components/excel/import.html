<div class="modal-header">
  <h5 class="modal-title">📊 Import {{ model_name }}</h5>
  <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>

<form id="excelImportForm" method="post" enctype="multipart/form-data">
  {% csrf_token %}

  <!-- Step 1: Upload -->
  <div id="uploadStep" class="modal-body">
    <div class="mb-3">
      <label class="form-label">Pilih file Excel</label>
      <input type="file" name="file" id="excelFile" class="form-control" accept=".xlsx,.xls,.csv" required>
      <small class="text-muted d-block mt-2">
        Format: .xlsx, .xls, atau .csv<br>
        Kolom yang didukung: {{ columns|join:", " }}
      </small>
    </div>

    <div id="uploadProgress" class="progress" style="display: none;">
      <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 100%">
        Loading...
      </div>
    </div>
  </div>

  <!-- Step 2: Preview -->
  <div id="previewStep" class="modal-body" style="display: none; max-height: 600px; overflow-y: auto;">
    <div id="previewContent"></div>
  </div>

  <div class="modal-footer">
    <!-- Upload button -->
    <button type="button" class="btn btn-primary" id="previewBtn" onclick="previewExcel(event)">
      👁️ Preview
    </button>

    <!-- Import button (hidden until preview) -->
    <button type="button" class="btn btn-success" id="importBtn" onclick="importExcel(event)" style="display: none;">
      ✅ Import Sekarang
    </button>

    <!-- Cancel -->
    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
  </div>
</form>

<script>
// Global function untuk preview
window.previewExcel = async function(e) {
  e.preventDefault();
  
  const fileInput = document.getElementById('excelFile');
  const file = fileInput.files[0];
  
  if (!file) {
    alert('Pilih file terlebih dahulu');
    return;
  }
  
  const formData = new FormData();
  formData.append('file', file);
  formData.append('action', 'preview');
  formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
  
  // Show progress
  document.getElementById('uploadProgress').style.display = 'block';
  document.getElementById('previewBtn').disabled = true;
  
  try {
    const response = await fetch('{{ import_url }}', {
      method: 'POST',
      body: formData
    });
    
    const result = await response.json();
    
    if (result.status === 'preview') {
      // Render preview
      renderPreview(result);
      
      // Show preview step
      document.getElementById('uploadStep').style.display = 'none';
      document.getElementById('previewStep').style.display = 'block';
      document.getElementById('previewBtn').style.display = 'none';
      document.getElementById('importBtn').style.display = 'inline-block';
      
    } else if (result.status === 'error') {
      showErrors(result.errors);
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('previewBtn').disabled = false;
    }
    
  } catch (error) {
    console.error('Error:', error);
    alert('Error: ' + error.message);
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('previewBtn').disabled = false;
  }
};

// Global function untuk import
window.importExcel = async function(e) {
  e.preventDefault();
  
  const fileInput = document.getElementById('excelFile');
  const file = fileInput.files[0];
  
  const formData = new FormData();
  formData.append('file', file);
  formData.append('action', 'import');
  formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);
  
  document.getElementById('uploadProgress').style.display = 'block';
  document.getElementById('importBtn').disabled = true;
  
  try {
    const response = await fetch('{{ import_url }}', {
      method: 'POST',
      body: formData
    });
    
    const result = await response.json();
    
    if (result.status === 'success') {
      // Success - show toast dan reload
      const toastContainer = document.getElementById('toastContainer') || (() => {
        const container = document.createElement('div');
        container.id = 'toastContainer';
        container.style.cssText = `
          position: fixed;
          top: 20px;
          right: 20px;
          z-index: 9999;
          width: 100%;
          max-width: 500px;
        `;
        document.body.appendChild(container);
        return container;
      })();
      
      const toastId = `toast-${Date.now()}`;
      const toastHtml = `
        <div id="${toastId}" class="toast show" role="alert" style="border-left: 4px solid #28a745;">
          <div class="toast-header" style="background-color: #f8f9fa; border-bottom: 1px solid #dee2e6;">
            <span style="color: #28a745; font-weight: bold; margin-right: 8px;">✅</span>
            <strong class="me-auto" style="color: #28a745;">Import Berhasil</strong>
            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close" onclick="document.getElementById('${toastId}').remove()"></button>
          </div>
          <div class="toast-body" style="padding: 15px;">
            <div style="font-size: 14px; color: #155724;">
              <div style="margin-bottom: 8px;"><strong>📊 ${result.imported || 0} data baru</strong> berhasil ditambahkan</div>
              <div style="margin-bottom: 8px;"><strong>🔄 ${result.updated || 0} data</strong> berhasil diperbarui</div>
            </div>
          </div>
        </div>
      `;
      
      toastContainer.insertAdjacentHTML('beforeend', toastHtml);
      
      // Close modal
      const modal = document.getElementById('modal');
      if (modal) {
        const bsModal = bootstrap.Modal.getInstance(modal);
        if (bsModal) bsModal.hide();
      }
      
      setTimeout(() => {
        window.location.reload();
      }, 2000);
      
    } else {
      showErrors(result.errors);
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('importBtn').disabled = false;
    }
    
  } catch (error) {
    console.error('Error:', error);
    alert('Error: ' + error.message);
    document.getElementById('uploadProgress').style.display = 'none';
    document.getElementById('importBtn').disabled = false;
  }
};

// Render preview table
function renderPreview(result) {
  const container = document.getElementById('previewContent');
  
  if (result.has_errors) {
    const errorHtml = `
      <div class="alert alert-warning">
        <strong>⚠️ Ada ${result.errors.length} baris dengan error</strong>
        <ul class="mt-2 mb-0">
          ${result.errors.map(err => `<li>${err}</li>`).join('')}
        </ul>
      </div>
    `;
    container.insertAdjacentHTML('afterbegin', errorHtml);
  }
  
  // Build table
  const table = document.createElement('table');
  table.className = 'table table-sm table-bordered';
  
  // Header
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  headerRow.innerHTML = `
    <th style="width: 60px; background-color: #f8f9fa;">No</th>
    <th style="background-color: #f8f9fa;">Status</th>
    <th style="background-color: #f8f9fa;">Data</th>
  `;
  thead.appendChild(headerRow);
  table.appendChild(thead);
  
  // Body
  const tbody = document.createElement('tbody');
  result.preview.forEach(item => {
    const row = document.createElement('tr');
    const statusBadge = item.status === 'valid'
      ? '<span class="badge bg-success">✓ Valid</span>'
      : '<span class="badge bg-danger">✗ Error</span>';
    
    const dataHtml = Object.entries(item.data)
      .map(([k, v]) => `<div><strong>${k}:</strong> ${v || '-'}</div>`)
      .join('');
    
    const errorHtml = item.errors.length > 0
      ? `<div class="text-danger small mt-2"><strong>Error:</strong> ${item.errors.join('; ')}</div>`
      : '';
    
    row.innerHTML = `
      <td align="center">${item.row}</td>
      <td>${statusBadge}</td>
      <td>${dataHtml}${errorHtml}</td>
    `;
    row.style.backgroundColor = item.status === 'error' ? '#fff5f5' : '#f9fff9';
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  
  container.appendChild(table);
}

// Show error messages dengan Toast
function showErrors(errors) {
  // Create toast container jika belum ada
  let toastContainer = document.getElementById('toastContainer');
  if (!toastContainer) {
    toastContainer = document.createElement('div');
    toastContainer.id = 'toastContainer';
    toastContainer.style.cssText = `
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      width: 100%;
      max-width: 500px;
    `;
    document.body.appendChild(toastContainer);
  }
  
  // Create main error toast
  const toastId = `toast-${Date.now()}`;
  const toastHtml = `
    <div id="${toastId}" class="toast show" role="alert" aria-live="assertive" aria-atomic="true" style="border-left: 4px solid #dc3545;">
      <div class="toast-header" style="background-color: #f8f9fa; border-bottom: 1px solid #dee2e6;">
        <span style="color: #dc3545; font-weight: bold; margin-right: 8px;">❌</span>
        <strong class="me-auto" style="color: #dc3545;">Error saat Import</strong>
        <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close" onclick="document.getElementById('${toastId}').remove()"></button>
      </div>
      <div class="toast-body" style="max-height: 300px; overflow-y: auto; padding: 15px;">
        <div style="font-size: 14px; line-height: 1.6;">
          ${errors.map((err, idx) => `
            <div style="margin-bottom: 10px; padding: 8px; background-color: #fff5f5; border-radius: 4px; border-left: 2px solid #dc3545;">
              <div style="color: #721c24; font-weight: 500;">⚠️ Error ${idx + 1}</div>
              <div style="color: #721c24; font-size: 13px; margin-top: 4px;">${err}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
  
  toastContainer.insertAdjacentHTML('beforeend', toastHtml);
  
  // Auto remove after 8 seconds
  setTimeout(() => {
    const toast = document.getElementById(toastId);
    if (toast) {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 300);
    }
  }, 8000);
}

// Reset form saat modal ditutup
document.addEventListener('hidden.bs.modal', function(e) {
  if (e.target.id === 'modal') {
    const form = document.getElementById('excelImportForm');
    if (form) form.reset();
    const uploadStep = document.getElementById('uploadStep');
    if (uploadStep) uploadStep.style.display = 'block';
    const previewStep = document.getElementById('previewStep');
    if (previewStep) {
      previewStep.style.display = 'none';
      document.getElementById('previewContent').innerHTML = '';
    }
    const previewBtn = document.getElementById('previewBtn');
    if (previewBtn) {
      previewBtn.style.display = 'inline-block';
      previewBtn.disabled = false;
    }
    const importBtn = document.getElementById('importBtn');
    if (importBtn) {
      importBtn.style.display = 'none';
      importBtn.disabled = false;
    }
    const progress = document.getElementById('uploadProgress');
    if (progress) progress.style.display = 'none';
  }
}, true);
</script>
