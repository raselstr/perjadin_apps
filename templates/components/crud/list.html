<div id="table-container">

  <!-- 🔥 FORM (HTMX ENABLED) -->
  <form id="filter-form"
      method="get"
      class="d-flex align-items-center gap-2 flex-nowrap w-100">

    <!-- per page -->
    <select name="per_page"
        class="form-select form-select-sm"
        style="width:90px;"
        hx-get="."
        hx-target="#table-container"
        hx-swap="innerHTML"
        hx-include="this, [name='search']">
      <option value="10" {% if request.GET.per_page == "10" %}selected{% endif %}>10</option>
      <option value="25" {% if request.GET.per_page == "25" %}selected{% endif %}>25</option>
      <option value="50" {% if request.GET.per_page == "50" %}selected{% endif %}>50</option>
      <option value="all" {% if request.GET.per_page == "all" %}selected{% endif %}>Semua</option>
    </select>

    <!-- search -->
    <input type="text" name="search"
       class="form-control form-control-sm"
       placeholder="Cari Data..."
       value="{{ request.GET.search }}"
       hx-get="."
       hx-target="#table-container"
       hx-swap="innerHTML"
       hx-trigger="keyup changed delay:500ms"
       hx-include="this, [name='per_page']">

  </form>
  <hr>

  <!-- TABLE -->
  <div class="table-responsive" hx-boost="true" hx-target="#table-container" hx-swap="innerHTML">
    {% load django_tables2 %}
    {% render_table table %}
  </div>

</div>

<script>
// Helper function to get current page from URL
function getCurrentPageFromURL() {
    const page = new URL(window.location.href).searchParams.get('page');
    return page || '1';
}

// Helper function to store current page
function storeCurrentPage() {
    const page = getCurrentPageFromURL();
    localStorage.setItem('lastPage', page);
    console.log('✅ Stored page in localStorage:', page);
}

// Store page immediately on script load
storeCurrentPage();

document.addEventListener('DOMContentLoaded', function() {
    const tableContainer = document.getElementById('table-container');
    const filterForm = document.getElementById('filter-form');
    
    if (!tableContainer || !filterForm) {
        console.error('Table container or filter form not found');
        return;
    }
    
    const perPageSelect = filterForm.querySelector('[name="per_page"]');
    const searchInput = filterForm.querySelector('[name="search"]');
    
    console.log('DOMContentLoaded: Initializing CRUD list');
    console.log('Current page:', getCurrentPageFromURL());
    console.log('localStorage lastPage:', localStorage.getItem('lastPage'));

    // 2. Helper to build URL with all form parameters
    function buildRequestUrl(page = null) {
        const url = new URL(window.location.href);
        const targetPage = page || localStorage.getItem('lastPage') || '1';
        
        url.searchParams.set('page', targetPage);
        url.searchParams.set('per_page', perPageSelect.value);
        
        if (searchInput.value) {
            url.searchParams.set('search', searchInput.value);
        } else {
            url.searchParams.delete('search');
        }
        
        console.log('Built request URL:', url.toString());
        return url.toString();
    }

    // 3. Handle per_page change
    perPageSelect.addEventListener('change', function() {
        const url = buildRequestUrl('1'); // Reset to page 1
        localStorage.setItem('lastPage', '1');
        console.log('Per page changed, reloading with URL:', url);
        
        htmx.ajax('GET', url, {
            target: '#table-container',
            swap: 'innerHTML'
        });
    });

    // 4. Handle search with debounce
    let searchTimeout;
    searchInput.addEventListener('keyup', function() {
        clearTimeout(searchTimeout);
        
        searchTimeout = setTimeout(() => {
            const url = buildRequestUrl('1'); // Reset to page 1
            localStorage.setItem('lastPage', '1');
            console.log('Search changed, reloading with URL:', url);
            
            htmx.ajax('GET', url, {
                target: '#table-container',
                swap: 'innerHTML'
            });
        }, 500);
    });

    // 5. IMPORTANT: Intercept pagination links directly with click handler
    tableContainer.addEventListener('click', function(e) {
        const link = e.target.closest('a');
        if (link && link.href) {
            const url = new URL(link.href, window.location.origin);
            const pageParam = url.searchParams.get('page');
            
            if (pageParam) {
                console.log('Pagination link clicked - page:', pageParam);
                localStorage.setItem('lastPage', pageParam);
            }
        }
    });
    
    // 6. Also use htmx:beforeRequest as backup
    tableContainer.addEventListener('htmx:beforeRequest', function(evt) {
        console.log('htmx:beforeRequest fired');
        const url = new URL(evt.detail.xhr.responseURL || window.location.href, window.location.origin);
        const pageParam = url.searchParams.get('page');
        if (pageParam) {
            console.log('htmx:beforeRequest - storing page:', pageParam);
            localStorage.setItem('lastPage', pageParam);
        }
    });
});

// 7. Global function to reload table after CRUD
window.reloadTableWithPage = function() {
    const filterForm = document.getElementById('filter-form');
    const tableContainer = document.getElementById('table-container');
    
    if (!filterForm || !tableContainer) {
        console.error('Form or container not found');
        return;
    }
    
    // Get form values
    const perPageSelect = filterForm.querySelector('[name="per_page"]');
    const searchInput = filterForm.querySelector('[name="search"]');
    
    const lastPage = localStorage.getItem('lastPage') || '1';
    console.log('reloadTableWithPage: lastPage from storage =', lastPage);
    
    // Build URL
    const url = new URL(window.location.href);
    url.searchParams.set('page', lastPage);
    url.searchParams.set('per_page', perPageSelect.value);
    
    if (searchInput.value) {
        url.searchParams.set('search', searchInput.value);
    } else {
        url.searchParams.delete('search');
    }
    
    console.log('reloadTableWithPage: Making request to:', url.toString());
    
    // Make request
    htmx.ajax('GET', url.toString(), {
        target: '#table-container',
        swap: 'innerHTML'
    });
};

// 8. Listen for HTMX form submissions from modal (global listener)
document.addEventListener('htmx:afterRequest', function(evt) {
    try {
        console.log('htmx:afterRequest event fired');
        
        // Get the status and path info
        const xhr = evt?.detail?.xhr;
        const status = xhr?.status;
        const target = evt?.detail?.target;
        const pathInfo = evt?.detail?.pathInfo;
        
        console.log('Status:', status, 'Target:', target?.id || target?.tagName);
        console.log('Path:', pathInfo?.requestPath);
        
        // Only handle 204 responses
        if (status !== 204) {
            console.log('Not a 204 response, skipping');
            return;
        }
        
        // Check if this is a FORM/DELETE request by looking at the path
        const requestPath = pathInfo?.requestPath || '';
        const isFormSubmission = requestPath.includes('/form/') || requestPath.includes('/delete/');
        
        console.log('Is form/delete request:', isFormSubmission);
        
        if (!isFormSubmission) {
            console.log('Not a form/delete submission, skipping');
            return;
        }
        
        console.log('✅ Form submission successful (204 No Content)');
        
        // Close modal - try multiple approaches
        const modal = document.getElementById('modal');
        console.log('Modal found:', !!modal);
        
        if (modal) {
            // Approach 1: Bootstrap Modal API
            try {
                let bootstrapModal = bootstrap.Modal.getInstance(modal);
                if (!bootstrapModal) {
                    bootstrapModal = new bootstrap.Modal(modal);
                }
                bootstrapModal.hide();
                console.log('✅ Modal closed via Bootstrap API');
            } catch (e) {
                console.error('Bootstrap API failed:', e);
                // Approach 2: Fallback - use data-bs-dismiss button
                const dismissBtn = modal.querySelector('[data-bs-dismiss="modal"]');
                if (dismissBtn) {
                    dismissBtn.click();
                    console.log('✅ Modal closed via dismiss button click');
                }
            }
        } else {
            console.error('❌ Modal element not found');
        }
        
        // Reload table after modal closes
        setTimeout(() => {
            console.log('Calling reloadTableWithPage...');
            window.reloadTableWithPage();
        }, 300);
        
    } catch (error) {
        console.error('Error in htmx:afterRequest handler:', error);
    }
});
</script>

{% include 'components/crud/modal.html'%}
