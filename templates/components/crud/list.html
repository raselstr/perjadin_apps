<div id="table-container"
      data-url="{% url url_list %}"
      hx-trigger="load, reloadTable"
      hx-swap="innerHTML">

  <!-- 🔥 FORM (HTMX ENABLED) -->
  <form method="get"
      hx-get="{% url url_list %}"
      hx-target="#table-container"
      hx-swap="innerHTML"
      hx-trigger="submit"
      hx-include="this"
      class="d-flex align-items-center gap-2 flex-nowrap w-100">

    <!-- per page -->
    <select name="per_page"
        class="form-select form-select-sm"
        style="width:90px;"
        hx-get="{% url url_list %}"
        hx-trigger="change"
        hx-target="#table-container"
        hx-include="closest form">
      <option value="10" {% if request.GET.per_page == "10" %}selected{% endif %}>10</option>
      <option value="25" {% if request.GET.per_page == "25" %}selected{% endif %}>25</option>
      <option value="50" {% if request.GET.per_page == "50" %}selected{% endif %}>50</option>
      <option value="all" {% if request.GET.per_page == "all" %}selected{% endif %}>Semua</option>
    </select>

    <!-- search -->
    <input type="text" name="search"
       class="form-control form-control-sm"
       placeholder="Cari Data..."
       value="{{ request.GET.search }}"
       hx-get="{% url url_list %}"
       hx-trigger="keyup changed delay:500ms"
       hx-target="#table-container"
       hx-include="closest form">

  </form>
  <hr>

  <!-- TABLE -->
  <div class="table-responsive"
       hx-boost="true"
       hx-target="#table-container"
       hx-swap="innerHTML"
       hx-include="[name='search'],[name='per_page']">
    {% load django_tables2 %}
    {% render_table table %}
  </div>

</div>

<script>
// HTMX boost for table pagination and sorting
document.addEventListener('DOMContentLoaded', function() {
    // Intercept pagination and sorting links in the table
    document.getElementById('table-container').addEventListener('click', function(e) {
        const link = e.target.closest('a');
        if (link && link.href && link.href.includes('?')) {
            e.preventDefault();
            htmx.ajax('GET', link.href, {
                target: '#table-container',
                swap: 'innerHTML',
                include: '[name="search"],[name="per_page"]'
            });
        }
    });
});
</script>
