<div id="table-container">

  <!-- 🔥 FORM (HTMX ENABLED) -->
  <form id="filter-form"
      method="get"
      class="d-flex align-items-center gap-2 flex-nowrap w-100">

    <!-- per page -->
    <select name="per_page"
        class="form-select form-select-sm"
        style="width:90px;">
      <option value="10" {% if request.GET.per_page == "10" %}selected{% endif %}>10</option>
      <option value="25" {% if request.GET.per_page == "25" %}selected{% endif %}>25</option>
      <option value="50" {% if request.GET.per_page == "50" %}selected{% endif %}>50</option>
      <option value="all" {% if request.GET.per_page == "all" %}selected{% endif %}>Semua</option>
    </select>

    <!-- search -->
    <input type="text" name="search"
       class="form-control form-control-sm"
       placeholder="Cari Data..."
       value="{{ request.GET.search }}">

  </form>
  <hr>

  <!-- TABLE -->
  <div class="table-responsive" hx-boost="true" hx-target="#table-container" hx-swap="innerHTML">
    {% load django_tables2 %}
    {% render_table table %}
  </div>

</div>

<script>
(function () {
    function getPageStorageKey() {
        return `crudLastPage:${window.location.pathname}`;
    }

    function setStoredPage(page) {
        localStorage.setItem(getPageStorageKey(), String(page || '1'));
    }

    function getStoredPage() {
        return localStorage.getItem(getPageStorageKey()) || '1';
    }

    function getCurrentPageFromTable() {
        const activePage = document.querySelector(
            '#table-container .pagination .active .page-link, ' +
            '#table-container .pagination .active a, ' +
            '#table-container .pagination .active span'
        );
        const pageText = activePage?.textContent?.trim();

        if (pageText && /^\d+$/.test(pageText)) {
            return pageText;
        }

        return document.querySelector('#table-container .pagination') ? getStoredPage() : '1';
    }

    function syncStoredPageFromTable() {
        setStoredPage(getCurrentPageFromTable());
    }

    function buildRequestUrl(page = null) {
        const filterForm = document.getElementById('filter-form');
        const perPageSelect = filterForm?.querySelector('[name="per_page"]');
        const searchInput = filterForm?.querySelector('[name="search"]');
        const url = new URL(window.location.href);
        const targetPage = page || getStoredPage();

        if ((perPageSelect?.value || '10') === 'all') {
            url.searchParams.set('per_page', 'all');
            url.searchParams.delete('page');
        } else {
            url.searchParams.set('page', targetPage);
            url.searchParams.set('per_page', perPageSelect?.value || '10');
        }

        if (searchInput?.value) {
            url.searchParams.set('search', searchInput.value);
        } else {
            url.searchParams.delete('search');
        }

        return url.toString();
    }

    window.reloadTableWithPage = function (page = null) {
        const tableContainer = document.getElementById('table-container');

        if (!tableContainer) {
            return;
        }

        htmx.ajax('GET', buildRequestUrl(page), {
            target: '#table-container',
            swap: 'innerHTML'
        });
    };

    function initializeCrudList() {
        const tableContainer = document.getElementById('table-container');
        const filterForm = document.getElementById('filter-form');

        if (!tableContainer || !filterForm) {
            return;
        }

        const perPageSelect = filterForm.querySelector('[name="per_page"]');
        const searchInput = filterForm.querySelector('[name="search"]');

        syncStoredPageFromTable();

        if (perPageSelect && !perPageSelect.dataset.pageHandlerBound) {
            perPageSelect.dataset.pageHandlerBound = 'true';
            perPageSelect.addEventListener('change', function () {
                setStoredPage('1');
                window.reloadTableWithPage('1');
            });
        }

        if (searchInput && !searchInput.dataset.searchHandlerBound) {
            let searchTimeout;

            searchInput.dataset.searchHandlerBound = 'true';
            searchInput.addEventListener('input', function () {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(function () {
                    setStoredPage('1');
                    window.reloadTableWithPage('1');
                }, 500);
            });
        }

        if (!tableContainer.dataset.paginationHandlerBound) {
            tableContainer.dataset.paginationHandlerBound = 'true';
            tableContainer.addEventListener('click', function (event) {
                const link = event.target.closest('a[href]');

                if (!link) {
                    return;
                }

                const url = new URL(link.href, window.location.origin);
                const pageParam = url.searchParams.get('page');

                if (pageParam) {
                    setStoredPage(pageParam);
                }
            });
        }
    }

    if (!window.__crudListHandlersBound) {
        document.body.addEventListener('htmx:afterRequest', function (event) {
            const xhr = event?.detail?.xhr;
            const requestPath = event?.detail?.pathInfo?.requestPath || '';
            const isCrudSubmission = requestPath.includes('/form/') || requestPath.includes('/delete/');

            if (xhr?.status !== 204 || !isCrudSubmission) {
                return;
            }

            const modal = document.getElementById('modal');
            if (modal) {
                bootstrap.Modal.getOrCreateInstance(modal).hide();
            }

            setTimeout(function () {
                window.reloadTableWithPage();
            }, 200);
        });

        document.body.addEventListener('htmx:afterSwap', function (event) {
            const targetId = event.detail.target?.id;

            if (targetId === 'table-container' || targetId === 'main-content') {
                initializeCrudList();
                syncStoredPageFromTable();
            }
        });

        window.__crudListHandlersBound = true;
    }

    initializeCrudList();
})();
</script>
