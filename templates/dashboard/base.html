<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        body { overflow-x: hidden; }

        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            background: #1e293b;
            color: white;
        }

        .sidebar a {
            color: #cbd5f5;
            text-decoration: none;
            display: block;
            padding: 10px 15px;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: #334155;
            color: white;
        }

        .submenu {
            display: none;
        }

        .submenu.show {
            display: block;
        }

        .content {
            margin-left: 250px;
            padding: 20px;
        }

        .topbar {
            background: white;
            padding: 10px 20px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="p-3">🚀 Dashboard</h4>

    {% for item in menu_data %}
        <div>
            <a href="javascript:void(0)" onclick="toggleMenu('{{ item.menu.id }}')">
                <strong>{{ item.menu.nama }}</strong>
            </a>

            <div id="submenu-{{ item.menu.id }}" class="submenu">
                {% for sub in item.submenus %}
                    <a 
                        hx-get="{{ sub.url }}" 
                        hx-target="#main-content"
                        hx-push-url="true"
                        onclick="setActive(this)"
                    >
                        {{ sub.nama }}
                    </a>
                {% endfor %}
            </div>
        </div>
    {% endfor %}
</div>

<!-- CONTENT -->
<div class="content">

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between">
        <div>Halo, <strong>{{ user.username }}</strong></div>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-danger btn-sm">Logout</button>
        </form>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content" class="mt-4">
        {% block content %}
        {% endblock %}
    </div>

</div>

<!-- SCRIPT -->
<script>
function toggleMenu(id) {
    let el = document.getElementById('submenu-' + id);
    el.classList.toggle('show');
}

function setActive(el) {
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
    el.classList.add('active');
}
</script>

</body>
</html>
