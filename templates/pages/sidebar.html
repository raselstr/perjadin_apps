<style>
    /* Animasi Panah: Berputar saat menu terbuka */
    .menu-toggle .arrow {
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 0.5;
    }
    
    /* Class .open ditambahkan via JavaScript toggleMenu */
    .menu-toggle.open .arrow {
        transform: rotate(90deg);
        opacity: 1;
    }

    /* Icon Bullet Default untuk Submenu */
    .submenu i-icon svg {
        fill: var(--primary-color);
        opacity: 0.6;
        transition: var(--transition);
    }

    .submenu a:hover i-icon svg {
        opacity: 1;
        transform: scale(1.2);
    }

    /* --- PERBAIKAN UTAMA UNTUK COLLAPSED MODE --- */
    .sidebar.collapsed {
        width: 80px !important;
        overflow: visible !important; 
        z-index: 1100;
    }

    .sidebar.collapsed .sidebar-menu {
        overflow: visible !important;
    }

    .sidebar.collapsed .menu-toggle .arrow,
    .sidebar.collapsed .menu-text,
    .sidebar.collapsed .badge-counter {
        display: none !important;
    }

    @media (min-width: 992px) {
        .sidebar.collapsed .menu-item-container {
            position: relative;
        }

        .sidebar.collapsed .submenu {
            position: absolute !important;
            left: 100% !important;
            top: 0 !important;
            width: 220px !important;
            background: #0f172a !important;
            border-radius: 0 8px 8px 0 !important;
            box-shadow: 15px 5px 30px rgba(0,0,0,0.5) !important;
            margin: 0 !important;
            padding: 10px 0 !important;
            z-index: 999999 !important; 
            display: none !important; 
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            transform: translateX(-5px);
            border: 1px solid rgba(255,255,255,0.1);
            border-left: none;
        }

        .sidebar.collapsed .menu-item-container:hover .submenu {
            display: block !important;
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        .sidebar.collapsed .submenu a {
            padding: 12px 20px !important;
            color: #cbd5e1 !important;
            white-space: nowrap !important;
            display: flex !important;
            align-items: center !important;
            gap: 12px !important;
            text-decoration: none !important;
            font-size: 0.875rem !important;
            background: transparent !important;
            margin-left: 0 !important;
        }

        .sidebar.collapsed .submenu a:hover {
            background: rgba(59, 130, 246, 0.15) !important;
            color: #fff !important;
            padding-left: 25px !important;
        }
    }
</style>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header d-flex align-items-center justify-content-between p-3">
        <h5 class="m-0 fw-bold text-white">🚀 Admin Pro</h5>
        <button class="btn btn-sm text-white d-lg-none" onclick="toggleSidebar()">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <div class="sidebar-menu">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">
            <i-icon>
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                </svg>
            </i-icon>
            <span class="menu-text"><strong>Dashboard</strong></span>
        </a>

        {% for item in menu_data %}
            <div class="menu-item-container">
                <a href="javascript:void(0)" class="menu-toggle" onclick="toggleMenu('{{ item.menu.id }}', this)">
                    <i-icon>
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                        </svg>
                    </i-icon>
                    <span class="menu-text">{{ item.menu.nama }}</span>
                    {% if item.submenus %}
                    <svg class="arrow ms-auto" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/>
                    </svg>
                    {% endif %}
                </a>

                <div id="submenu-{{ item.menu.id }}" class="submenu">
                    {% for sub in item.submenus %}
                        <!-- PENYESUAIAN HTMX: Menggunakan tag url untuk resolusi name 'user_add' -->
                        <a hx-get="{% url sub.url %}" 
                           hx-target="#main-content" 
                           hx-push-url="true" 
                           style="cursor: pointer;"
                           onclick="handleSubmenuClick(this)">
                            <i-icon>
                                <svg width="8" height="8" viewBox="0 0 24 24">
                                    <circle cx="12" cy="12" r="8" fill="currentColor" />
                                </svg>
                            </i-icon>
                            <span class="menu-text">{{ sub.nama }}</span>
                        </a>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}
    </div>
</div>
