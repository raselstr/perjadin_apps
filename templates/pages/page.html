{% extends 'layouts/base.html' %}
{% load static %}

{% block title %} {{ title }} {% endblock title %}
{% block content %}
  <!-- [ Main Content ] start -->
  <div class="pc-container">
    <div class="pc-content">
      <!-- [ breadcrumb ] start -->
      <div class="page-header">
        <div class="page-block">
          <div class="row align-items-center">
            <div class="col-md-12">
              <div class="page-header-title">
                <h5 class="m-b-10">{{ title }}</h5>
              </div>
              <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
                <li class="breadcrumb-item" aria-current="page">{{ title }}</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
      <!-- [ breadcrumb ] end -->


      <!-- [ Main Content ] start -->
      <div class="row">
        <!-- [ sample-page ] start -->
        <div class="col-sm-12">
          <div class="card">
            <div class="card-header">
              <div class="d-flex justify-content-between align-items-center mb-0">
                <h3 class="mb-0">{{ title }}</h3>
                <button class="btn btn-primary"
                        hx-get="{% url url_action %}"
                        hx-target="#modal-body"
                        data-bs-toggle="modal"
                        data-bs-target="#modal">
                  + Tambah
                </button>
              </div>
            </div>
            <div class="card-body">
              <div id="main-content"
                hx-get="{{ initial_url }}"
                hx-trigger="load"
                hx-target="this"
                hx-swap="innerHTML">
              </div>
            </div>
          </div>
        </div>
        <!-- [ sample-page ] end -->
      </div>
      <!-- [ Main Content ] end -->
    </div>
  </div>
  <!-- [ Main Content ] end -->

    {% endblock content %}

{% block extrastyle %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" rel="stylesheet" />

<style>
.select2-container .select2-selection--single {
    height: 38px !important;
    border: 1px solid #ced4da;
    border-radius: 0.375rem;
    padding: 6px 12px;
}

.select2-container .select2-selection__rendered {
    line-height: 24px !important;
}

.select2-container .select2-selection__arrow {
    height: 36px !important;
}
</style>
{% endblock %}

{% block extra_js %}
<script>
  function initSelect2() {
    destroySelect2();
    $('.select2, .select2-ajax').select2({
      width: '100%',
      dropdownParent: $('#modal'),
      theme: 'bootstrap-5'
    });
  }
  function destroySelect2() {
    $('.select2, .select2-ajax').each(function () {
      if ($(this).hasClass("select2-hidden-accessible")) {
        $(this).select2('destroy');
      }
    });
  }

  function forceCloseModal() {
    const modalEl = document.getElementById('modal');

    // 🔥 paksa hide bootstrap
    const modalInstance = bootstrap.Modal.getOrCreateInstance(modalEl);
    modalInstance.hide();

    // 🔥 HARD CLEANUP (INI KUNCI)
    setTimeout(() => {

        // hapus semua backdrop
        document.querySelectorAll('.modal-backdrop').forEach(el => el.remove());

        // reset class body
        document.body.classList.remove('modal-open');

        // reset style bootstrap
        document.body.style.overflow = '';
        document.body.style.paddingRight = '';

        // reset modal content
        const body = document.getElementById('modal-body');
        if (body) body.innerHTML = '';

    }, 300);
  }

  // FORM SUCCESS HANDLER
  document.body.addEventListener('formSuccess', function () {
      requestAnimationFrame(() => {
          requestAnimationFrame(() => {
              forceCloseModal();
          });
      });
  });

  // TABLE REFRESH
  document.body.addEventListener('reloadTable', function () {
      htmx.ajax('GET', document.querySelector('#table-container').dataset.url, {
          target: '#table-container',
          swap: 'innerHTML'
      });
  });

</script>
{% endblock %}
