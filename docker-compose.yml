version: '3.9'

services:

  db:
    image: postgres:14
    container_name: postgres_db
    restart: always
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB_FILE: /run/secrets/db_name
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_name
      - db_user
      - db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - perjadinapps_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $(cat /run/secrets/db_user) -d $(cat /run/secrets/db_name)"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: perjadin_apps
    restart: always
    # ❌ HAPUS volume ini (biar tidak override build)
    # volumes:
    #   - .:/app
    secrets:
      - db_name
      - db_user
      - db_password
      - secret_key
    environment:
      DB_HOST: postgres_db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - perjadinapps_network

  nginx:
    image: nginx:latest
    container_name: nginx_server
    restart: always
    ports:
      - "8085:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles   # 🔥 share static
      - media_volume:/app/media         # optional
    depends_on:
      - web
    networks:
      - perjadinapps_network

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    restart: always
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      db:
        condition: service_healthy
    networks:
      - perjadinapps_network

networks:
  perjadinapps_network:

secrets:
  db_name:
    file: ./secrets/db_name.txt
  db_user:
    file: ./secrets/db_user.txt
  db_password:
    file: ./secrets/db_password.txt
  secret_key:
    file: ./secrets/secret_key.txt

volumes:
  postgres_data:
  cloudbeaver_data:
  static_volume:
  media_volume: